<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Dil Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Jost:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --bg-dark: #0C0C0C;
            --bg-card: #141414;
            --text: #F5F0E5;
            --transition: all 0.4s ease;
        }

        body { background-color: var(--bg-dark); color: var(--text); font-family: 'Jost', sans-serif; margin: 0; display: flex; }

        /* MOBILE RESPONSIVE */
        .hamburger-admin{display:none;position:fixed;top:16px;left:16px;z-index:400;flex-direction:column;gap:5px;cursor:pointer;background:var(--bg-card);border:1px solid rgba(201,168,76,0.3);padding:10px;border-radius:4px}
        .hamburger-admin span{display:block;width:20px;height:2px;background:var(--gold);border-radius:2px;transition:all .3s ease}
        .hamburger-admin.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
        .hamburger-admin.open span:nth-child(2){opacity:0}
        .hamburger-admin.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300}
        .sidebar-overlay.open{display:block}

        @media(max-width:768px){
            .sidebar{transform:translateX(-100%);transition:transform .35s ease;z-index:350;position:fixed}
            .sidebar.open{transform:translateX(0)}
            .hamburger-admin{display:flex}
            .main-content{margin-left:0;padding:80px 20px 40px}
            .form-section{padding:24px 20px}
        }

        .sidebar { width: 250px; height: 100vh; background: var(--bg-card); border-right: 1px solid rgba(201, 168, 76, 0.2); padding: 40px 20px; position: fixed; }
        .sidebar h2 { font-family: 'Cormorant Garamond', serif; color: var(--gold); margin-bottom: 40px; }

        .nav-btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; background: none; border: none; color: var(--text); text-align: left; cursor: pointer; border-radius: 5px; transition: var(--transition); }
        .nav-btn.active { background: rgba(201, 168, 76, 0.1); color: var(--gold); }

        .main-content { margin-left: 250px; padding: 60px; width: 100%; }
        .form-section { background: var(--bg-card); padding: 40px; border-radius: 10px; border: 1px solid rgba(201, 168, 76, 0.1); max-width: 600px; display: none; }
        .form-section.active { display: block; }

        h3 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--gold); margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; }
        
        /* Custom File Upload Styling */
        input[type="file"] { padding: 10px; background: #1a1a1a; cursor: pointer; }

        .submit-btn { background: var(--gold); color: #000; border: none; padding: 15px 30px; font-weight: 600; cursor: pointer; text-transform: uppercase; width: 100%; }
        .success-msg { color: #4BB543; margin-top: 15px; display: none; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
<button class="hamburger-admin" id="hamburgerAdmin"><span></span><span></span><span></span></button>
<div class="sidebar" id="adminSidebar">
        <h2>DIL ADMIN</h2>
        <button class="nav-btn active" onclick="showSection('meal-section', this)">Post New Meal</button>
        <button class="nav-btn" onclick="showSection('promo-section', this)">Post Discount</button>
        <a href="specials.html" style="color: var(--gold); text-decoration: none; display: block; padding: 15px; margin-top: 20px; font-size: 0.8rem;">View Specials Page →</a>
    </div>

    <div class="main-content">
        <div id="meal-section" class="form-section active">
            <h3>Add New Featured Meal</h3>
            <div class="input-group">
                <label>Meal Name</label>
                <input type="text" id="mealName" placeholder="e.g. Tandoori Platter">
            </div>
            <div class="input-group">
                <label>Price (K)</label>
                <input type="number" id="mealPrice" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Dish Image</label>
                <input type="file" id="mealImage" accept="image/*">
            </div>
            <div class="input-group">
                <label>Description</label>
                <textarea id="mealDesc" rows="3"></textarea>
            </div>
            <button class="submit-btn" onclick="processMeal()">Publish Meal</button>
            <p id="mealMsg" class="success-msg">Dish uploaded and live!</p>
        </div>

        <div id="promo-section" class="form-section">
            <h3>Create Discount</h3>
            <button class="submit-btn" onclick="saveItem('promos')">Publish Discount</button>
        </div>
    </div>

    <script>
        function showSection(id, btn) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // Specifically handles the image conversion
        function processMeal() {
            const fileInput = document.getElementById('mealImage');
            const file = fileInput.files[0];
            
            if (file) {
                const reader = new FileReader();
                reader.onloadend = function() {
                    saveMeal(reader.result); // Pass the base64 string
                }
                reader.readAsDataURL(file);
            } else {
                saveMeal(null); // Save without image if none selected
            }
        }

        function saveMeal(imageData) {
            let meals = JSON.parse(localStorage.getItem('dil_meals')) || [];
            let newMeal = {
                name: document.getElementById('mealName').value,
                price: document.getElementById('mealPrice').value,
                desc: document.getElementById('mealDesc').value,
                image: imageData // Store image string here
            };

            meals.push(newMeal);
            localStorage.setItem('dil_meals', JSON.stringify(meals));
            
            document.getElementById('mealMsg').style.display = 'block';
            setTimeout(() => location.reload(), 1500);
        }
    </script>
    <script>
        const hBtn = document.getElementById('hamburgerAdmin');
        const sidebar = document.getElementById('adminSidebar');
        const overlay = document.getElementById('sidebarOverlay');
        function toggleSidebar(){
            hBtn.classList.toggle('open');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('open');
        }
        hBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);
        // close on nav button click (mobile)
        document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => {
            if(window.innerWidth <= 768) toggleSidebar();
        }));
    </script>
</body>
</html>
